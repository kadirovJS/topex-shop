<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Topex Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
   <style>
        body { font-family: 'Nunito Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Rubik', sans-serif; }
        .loader {
            --main-size: 1.5em;
            --text-color: #ffffff;
            --shine-color: #ffffff40;
            --shadow-color: #aaaaaa;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            font-size: var(--main-size);
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-color);
            width: 7.3em;
            height: 1em;
        }
        /* Minimal loader style to fit the button */
        .loader .text { display: none; }
        .loader::after {
            content: "YUKLANMOQDA...";
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>

</head>
<body class="bg-rose-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b border-rose-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-rose-600 rounded-lg flex items-center justify-center text-white font-bold">T</div>
                    <span class="text-xl font-bold text-rose-900">Admin Panel</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-rose-600 hover:text-rose-700 font-medium transition-colors">Do'konga qaytish</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Sidebar: Add Product Form -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm border border-rose-100 p-6 sticky top-24">
                    <h2 class="text-2xl font-bold text-rose-900 mb-6 text-center">Yangi Mahsulot</h2>
                    
                    <form id="form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-rose-700 mb-1">Nomi</label>
                            <input type="text" name="name" required placeholder="Masalan: iPhone 15 Pro" 
                                class="w-full px-4 py-2 border border-rose-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-all">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-rose-700 mb-1">Tavsif</label>
                            <textarea name="description" required placeholder="Mahsulot haqida qisqacha..." rows="3"
                                class="w-full px-4 py-2 border border-rose-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-all"></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-rose-700 mb-1">Narxi (UZS)</label>
                            <input type="text" name="price" required placeholder="Masalan: 12 000 000" 
                                class="w-full px-4 py-2 border border-rose-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-all">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-rose-700 mb-1">Rasm URL</label>
                            <input type="text" name="image" required placeholder="https://image-url.com/image.jpg" 
                                class="w-full px-4 py-2 border border-rose-200 rounded-xl focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition-all">
                        </div>

                        <button id="post" type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-rose-200 transition-all flex items-center justify-center gap-2 group">
                            <span>QO'SHISH</span>
                            <div id="load" style="display: none" class="loader"></div>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Main Content: Product List -->
            <div class="lg:col-span-2">
                <div class="mb-6 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-rose-900">Mavjud Mahsulotlar</h2>
                </div>
                
                <!-- This is where main.js will render products -->
                <div id="con" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Products will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <script src="./main.js"></script>
</body>
</html>
